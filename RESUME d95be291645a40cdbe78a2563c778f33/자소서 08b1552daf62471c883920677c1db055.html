</style></head><body><article id="08b1552d-af62-471c-8839-20677c1db055" class="page sans"><header><img class="page-cover-image" src="https://images.unsplash.com/photo-1528780128380-06cff9fec963?ixlib=rb-1.2.1&amp;q=80&amp;cs=tinysrgb&amp;fm=jpg&amp;crop=entropy" style="object-position:center 66.51%"/><div class="page-header-icon page-header-icon-with-cover"><span class="icon">🌻</span></div><h1 class="page-title">자소서</h1></header><div class="page-body"><h3 id="5ddcd253-6317-4af6-86a4-52388083054f" class="">1. 관심있는 개발 분야 소개</h3><figure class="block-color-gray_background callout" style="white-space:pre-wrap;display:flex" id="5d584e27-c05d-438b-acee-edebe4dc1f04"><div style="font-size:1.5em"><span class="icon">💡</span></div><div style="width:100%">구순구개열로 태어나면 매번 사소한 것에서 다른 사람과 다름을 느낍니다. 첫번째는 외모, 두번째는 발음인데, 이 두가지 중 더 서러운 것은 발음입니다. 누군가가 제 이름을 묻는 것이 불편할 때가 있었습니다. 매번 “기혜”로 잘못 발음했기 때문입니다. 어떤 순간에는 외국에서 왔는지 물어보기도 하고 언젠가는 정신 발달에 장애가 있는지 물어보는 사람도 있었습니다. 그만큼 발음은 사회적으로 그리고 일상적으로 큰 영향을 미치는 부분입니다. 그래서 언젠가는 스스로 발음을 진단하고 또 교정하는 연습을 하고, 꾸준히 연습할 수 있도록 도와주는 앱을 개발할 수 있을 정도의 능력을 기르고 싶습니다.<p id="bcc53e34-0d2c-482b-89f0-e34db52be6c6" class="">다음으로 저는 사람을 좋아합니다. 그래서 많은 사람들이 함께 할 수 있는 모임을 독려하는 커뮤니티나 사람들의 모임 활동을 지원할 수 있는 백오피스를 만들 수 있는 능력을 기르고 싶습니다.</p></div></figure><h3 id="21dede6d-c408-44e0-9f46-b122c786116a" class="">2. 개발자를 선택하게 된 이유</h3><figure class="block-color-gray_background callout" style="white-space:pre-wrap;display:flex" id="835f2c52-073f-4dcc-aff1-fa4ee2fda2f2"><div style="font-size:1.5em"><span class="icon">💡</span></div><div style="width:100%">태어나서 12살 때부터 웹소설 읽는 것을 좋아했습니다. 그렇게 지금까지 웹소설, 웹툰, 게임들을 접해오면서 언젠가는 이러한 창작자들 근처에서 일하고 싶다는 생각을 했습니다. 인터넷과 미디어는 제가 사랑하는 창작물을 대중에게 연결해주는 창구였고 제겐 또 하나의 꿈으로 향하는 길이었습니다. 처음에는 단순히 그런 마음으로 시작했지만 지금은 제 개인의 생각을 전하는 창구도 될 수 있다고 믿습니다. 그래서 지금은 제가 좋아하는 작품, 서비스들을 더 많은 사람들이 편하게 접할 수 있기를 바라는 마음으로 개발자를 선택하게 되었습니다.</div></figure><h3 id="50f4b9ea-49a2-47e6-ada3-3a0c76fabc07" class="">3. 다른 사람과 구별되는 나만의 강점</h3><figure class="block-color-gray_background callout" style="white-space:pre-wrap;display:flex" id="40df42a1-137e-45f1-b15e-0b5a5ddcc916"><div style="font-size:1.5em"><span class="icon">💡</span></div><div style="width:100%">팀 단위로 단체에 속하여 사업을 진행한 경험이 있습니다. 회의나 팀을 이끄는 과정에서 회의의 진행 상황을 파악하고 적시에 필요한 방향성으로 환기 시키는 부분을 잘 실행할 수 있습니다. 또한 언제나 의견이 필요할때 가장 먼저 나서서 말하는 사람이 될 수 있습니다. 모르는 것이 있다면 그 또한 솔직하게 말하고 긍정적이고 열정적인 자세로 다양한 방안을 계획하고 준비합니다. 팀원들이 저에 대해 충분히 알고 또 저 또한 팀원들의 상황을 잘 파악하는 소통 능력을 가지고 있다고 생각합니다.<p id="9ebf82bb-4e51-4067-b418-0c0656b4a5a8" class="">독서토론 소모임을 운영하던 중 남양주시에서 시민을 대상으로한 공모사업을 한다는 소식을 듣고 바로 지원서를 작성하고 소모임을 소집하여 구연동화 행사, 우리동네 책방 탐방 행사 등을 포함한 제안서를 발표하고 설득했습니다. 모두가 긍정적이어서 바로 지원하였고 이후 합격하여 공모사업을 진행하였습니다. 그 당시 코로나로 인해 기존에 계획했던 행사 진행이 어려워져 팀원들과 머리를 모아 무인 전시회, 브로셔 제작 등 전면 비대면으로 행사를 재 기획하였습니다. 비대면 행사를 진행해야 했기에 많은 양의 업무가 팀장인 제게 몰렸으나 최대한 많은 업무를 팀원들에게 분담하여 속도를 조절하고, 일을 진행하면서 꾸준히 팀원들의 의견 무언가 하고싶거나 해야할 일이 생기면 미루지 않고 도전하는 추진력이 있으며 또 진심으로 즐거워하고 열정적입니다. 현재 상황에서 최선의 아이디어를 뽑아내고 개발 중에도 멈추지 않고 더 좋은 기능을 추천하곤 합니다. 하지만 지구력이 부족해 긴 장기 프로젝트를 할 때는 어려움을 겪는데, 이렇게 긴 장기 프로젝트를 진행할 때는 주변 친구들에게 사전에 양해를 구하고 후기 담당자를 미리 설정해 두거나 새로운 방향성을 제시하여 제 스스로의 열정을 다시 끌어올려 극복합니다.</p></div></figure><p id="968b50b2-554f-4dbd-837f-22c2b4340a4f" class="">
</p><p id="ebe23682-7ab7-4b1d-a2f3-e3522026d243" class="">
